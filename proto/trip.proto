syntax = "proto3";

package trip;

option go_package = "shared/proto/trip;trip";

service TripService {
    rpc PreviewTrip(PreviewTripRequest) returns (PreviewTripResponse);
    rpc StartTrip(CreateTripRequest) returns (CreateTripResponse);
}

message PreviewTripRequest {
    string user_id = 1;
    Coordinate start_location = 2;
    Coordinate end_location = 3;
}

message PreviewTripResponse {
    string trip_id = 1;
    Route route = 2;
    repeated RideFare ride_fares = 3;
}

message Coordinate {
    double latitude = 1;
    double longitude = 2;
}

message Route {
    repeated Geometry geometry = 1;
    double distance = 2;
    double duration = 3;
}
message Geometry {
    repeated Coordinate coordinates = 1;
}

message RideFare {
    string id = 1;
    string user_id = 2;
    string package_slug = 3;
    double total_price_in_cents = 4;
}

message CreateTripRequest {
    string ride_fare_id = 1;
    string user_id = 2;
}

message CreateTripResponse {
    string trip_id = 1;
}
